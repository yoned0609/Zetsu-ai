display_information:
  name: "Zetsu Absentia"
  description: "Invisible Slack facilitator. Scores messages, nudges stuck users with ephemeral hints, alerts on hostile/injection-style traffic."
  background_color: "#1a1a1a"
features:
  bot_user:
    display_name: "Zetsu Absentia"
    always_online: true
oauth_config:
  scopes:
    bot:
      - "chat:write"
      - "chat:write.public"
      - "channels:history"
      - "groups:history"
      - "im:history"
      - "mpim:history"
settings:
  event_subscriptions:
    bot_events:
      - "message.channels"
      - "message.groups"
      - "message.im"
      - "message.mpim"
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
